services:
  nginx:
    image: nginx:stable
    ports:
      - "80:80"
    volumes:
      - ./nginx/html:/usr/share/nginx/html:ro
      - ./nginx/conf:/etc/nginx:ro
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      API_ROOT_PATH: /api
      TODO_DATA_DIR: /data
    volumes:
      - ./data:/data
